<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ballistic Tracker</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="app">
        <header id="app-header">
            <h1>Ballistic Tracker</h1>
            <button id="btn-new-session" class="header-btn" title="New Session">+</button>
        </header>

        <main id="canvas-container">
            <canvas id="main-canvas"></canvas>
            <div id="canvas-hint"></div>
            <div id="zoom-indicator" class="hidden">1.0x</div>
        </main>

        <footer id="step-panel">
            <div id="step-progress">
                <div id="progress-bar"></div>
            </div>

            <!-- Step 1: Load Image -->
            <section class="step active" id="step-load" data-step="1">
                <div class="step-header">
                    <span class="step-badge">1</span>
                    <span class="step-title">Load Target Image</span>
                </div>
                <div class="step-body">
                    <input type="file" id="input-camera" accept="image/*" capture="environment" hidden>
                    <input type="file" id="input-gallery" accept="image/*" hidden>
                    <div class="btn-row">
                        <button id="btn-camera" class="btn btn-primary">Take Photo</button>
                        <button id="btn-gallery" class="btn btn-secondary">Choose Image</button>
                    </div>
                </div>
            </section>

            <!-- Step 2: Calibrate -->
            <section class="step" id="step-calibrate" data-step="2">
                <div class="step-header">
                    <span class="step-badge">2</span>
                    <span class="step-title">Set 1&quot; Calibration</span>
                </div>
                <div class="step-body">
                    <p id="calibration-status" class="step-instruction">Zoom into a known 1-inch reference, then tap Point A</p>
                    <div class="btn-row">
                        <button id="btn-redo-calibration" class="btn btn-secondary hidden">Redo</button>
                        <button id="btn-next-calibration" class="btn btn-primary hidden">Continue</button>
                    </div>
                </div>
            </section>

            <!-- Step 3: Input Data -->
            <section class="step" id="step-data" data-step="3">
                <div class="step-header">
                    <span class="step-badge">3</span>
                    <span class="step-title">Distance &amp; Bullet</span>
                </div>
                <div class="step-body">
                    <div class="input-group">
                        <label for="input-distance">Distance (yards)</label>
                        <input type="number" id="input-distance" min="1" max="1500" step="1" inputmode="numeric" placeholder="100">
                    </div>
                    <div class="input-group">
                        <label for="input-bullet-dia">Bullet Diameter (in)</label>
                        <div class="input-with-presets">
                            <input type="number" id="input-bullet-dia" min="0.1" max="1.0" step="0.001" inputmode="decimal" placeholder="0.308">
                            <div class="presets">
                                <button class="preset-btn" data-value="0.224">.224</button>
                                <button class="preset-btn" data-value="0.243">.243</button>
                                <button class="preset-btn" data-value="0.264">.264</button>
                                <button class="preset-btn" data-value="0.277">.277</button>
                                <button class="preset-btn" data-value="0.284">.284</button>
                                <button class="preset-btn" data-value="0.308">.308</button>
                                <button class="preset-btn" data-value="0.338">.338</button>
                            </div>
                        </div>
                    </div>
                    <div class="btn-row">
                        <button id="btn-next-data" class="btn btn-primary" disabled>Continue</button>
                    </div>
                </div>
            </section>

            <!-- Step 4: Mark POA -->
            <section class="step" id="step-poa" data-step="4">
                <div class="step-header">
                    <span class="step-badge">4</span>
                    <span class="step-title">Mark Point of Aim</span>
                </div>
                <div class="step-body">
                    <p id="poa-status" class="step-instruction">Tap your point of aim on the target</p>
                    <div class="btn-row">
                        <button id="btn-redo-poa" class="btn btn-secondary hidden">Redo</button>
                        <button id="btn-next-poa" class="btn btn-primary hidden">Continue</button>
                    </div>
                </div>
            </section>

            <!-- Step 5: Mark Impacts -->
            <section class="step" id="step-impacts" data-step="5">
                <div class="step-header">
                    <span class="step-badge">5</span>
                    <span class="step-title">Mark Impacts</span>
                </div>
                <div class="step-body">
                    <p id="impact-status" class="step-instruction">Tap each bullet hole (0/10)</p>
                    <div class="btn-row">
                        <button id="btn-undo-impact" class="btn btn-secondary" disabled>Undo Last</button>
                        <button id="btn-calculate" class="btn btn-primary" disabled>Calculate</button>
                    </div>
                </div>
            </section>

            <!-- Step 6: Results -->
            <section class="step" id="step-results" data-step="6">
                <div class="step-header">
                    <span class="step-badge">6</span>
                    <span class="step-title">Results</span>
                </div>
                <div class="step-body">
                    <div id="results-card"></div>
                    <div class="btn-row">
                        <button id="btn-save-image" class="btn btn-primary">Save Image</button>
                        <button id="btn-share" class="btn btn-secondary">Share</button>
                        <button id="btn-new-from-results" class="btn btn-secondary">New Session</button>
                    </div>
                </div>
            </section>
        </footer>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/calculations.js"></script>
    <script src="js/canvas-manager.js"></script>
    <script src="js/calibration.js"></script>
    <script src="js/session-flow.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
